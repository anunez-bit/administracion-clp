<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Administración CLP</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f5f7fa;color:#17324d}button,input,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}.login{min-height:100vh;display:grid;place-items:center}.card,.panel{background:#fff;border:1px solid #d7e0e8;border-radius:8px;padding:24px}.login .card{width:min(420px,92%)}label{display:grid;gap:6px;margin:14px 0}input,select{padding:10px;border:1px solid #b8c6d2;border-radius:5px}.primary{border:0;background:#176fba;color:white;padding:11px 16px;border-radius:5px}.secondary{border:1px solid #9babb8;background:white;padding:10px 15px;border-radius:5px}.wide{width:100%}.msg{margin:12px 0;padding:10px;background:#fff1ef;color:#a43d32}.ok{background:#eaf7f2;color:#16795e}.app{min-height:100vh;display:grid;grid-template-columns:240px 1fr}.side{background:#0b3d64;color:#fff;padding:22px 14px;display:flex;flex-direction:column}.side h2{margin:0 8px 25px}.side button{border:0;background:transparent;color:#fff;padding:12px;text-align:left;border-radius:5px}.side button:hover,.side button.active{background:#176fba}.logout{margin-top:auto}.main{min-width:0}.top{background:#fff;border-bottom:1px solid #d7e0e8;padding:20px 26px;font-size:23px;font-weight:bold}.content{padding:24px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}.stat{background:#fff;border:1px solid #d7e0e8;padding:18px;border-radius:7px}.stat strong{display:block;font-size:28px;margin-top:6px}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:16px}.modules{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.module{background:#fff;border:1px solid #d7e0e8;border-radius:7px;padding:18px}.module h3{margin-top:0}.tablewrap{overflow:auto;background:#fff;border:1px solid #d7e0e8}table{border-collapse:collapse;width:100%;white-space:nowrap}th,td{padding:10px;border-bottom:1px solid #e1e7ec;text-align:left}th{background:#f7f9fb}.grid input{border:0;min-width:130px;width:100%}.drop{border:2px dashed #aebdca;padding:55px;text-align:center;background:#fff}.badge{font-size:12px;color:#16795e;border:1px solid #a8d4c5;padding:4px 7px;border-radius:10px}.muted{color:#64788b}@media(max-width:800px){.app{display:block}.side{min-height:auto}.logout{margin-top:10px}.stats,.modules{grid-template-columns:1fr}.content{padding:14px}}
</style></head><body>
<section id="login" class="login"><form id="loginForm" class="card"><h1>Administración CLP</h1><p class="muted">Acceso seguro a la base central.</p><label>Correo<input id="email" type="email" required></label><label>Contraseña<input id="password" type="password" minlength="8" required></label><div id="loginMsg"></div><button class="primary wide">Ingresar</button></form></section>
<section id="app" class="app hidden"><aside class="side"><h2>Administración CLP</h2><button data-view="resumen" class="active">Resumen</button><button data-view="modulos">Módulos</button><button data-view="importar" id="navImport">Importar Excel</button><button data-view="permisos" id="navPerm">Permisos</button><button id="logout" class="logout">Cerrar sesión</button></aside><main class="main"><header id="title" class="top">Panel general</header><div id="content" class="content"></div></main></section>
<script type="module">
import{createClient}from'https://esm.sh/@supabase/supabase-js@2';
const URL='https://pxmjgltiljjdgehobzqb.supabase.co',KEY='sb_publishable_UOtoVqjgPVOcEjMvHAZscA_f6WDaOdS',db=createClient(URL,KEY);
let session=null,profile=null,modules=[],activeView='resumen';const $=s=>document.querySelector(s),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function init(){const{data}=await db.auth.getSession();if(data.session)await enter(data.session)}
$('#loginForm').onsubmit=async e=>{e.preventDefault();$('#loginMsg').textContent='';const{data,error}=await db.auth.signInWithPassword({email:$('#email').value,password:$('#password').value});if(error)$('#loginMsg').innerHTML=`<div class="msg">${esc(error.message)}</div>`;else await enter(data.session)};
async function enter(s){session=s;const p=await db.from('profiles').select('id,full_name,email,role').eq('id',s.user.id).maybeSingle();if(p.error){$('#loginMsg').innerHTML='<div class="msg">Falta ejecutar el esquema de Supabase.</div>';return}profile=p.data;await loadModules();$('#login').classList.add('hidden');$('#app').classList.remove('hidden');const admin=profile?.role==='admin';$('#navImport').classList.toggle('hidden',!admin);$('#navPerm').classList.toggle('hidden',!admin);render()}
async function loadModules(){const m=await db.from('modules').select('id,name,slug,column_names,updated_at').order('created_at');const p=await db.from('module_permissions').select('module_id,access_level').eq('user_id',session.user.id);const access=Object.fromEntries((p.data||[]).map(x=>[x.module_id,x.access_level]));modules=await Promise.all((m.data||[]).map(async x=>{const c=await db.from('module_rows').select('id',{count:'exact',head:true}).eq('module_id',x.id);return{...x,rowCount:c.count||0,access:profile.role==='admin'?'write':access[x.id]||'none'}}));modules=modules.filter(x=>x.access!=='none')}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{activeView=b.dataset.view;document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x===b));render()});
$('#logout').onclick=async()=>{await db.auth.signOut();location.reload()};
function render(){const titles={resumen:'Panel general',modulos:'Módulos',importar:'Importar Excel',permisos:'Permisos'};$('#title').textContent=titles[activeView];if(activeView==='resumen')summary();if(activeView==='modulos')moduleList();if(activeView==='importar')importer();if(activeView==='permisos')permissions()}
function summary(){const rows=modules.reduce((n,m)=>n+m.rowCount,0);$('#content').innerHTML=`<h2>Bienvenido, ${esc(profile.full_name||session.user.email)}</h2><div class="stats"><div class="stat">Módulos<strong>${modules.length}</strong></div><div class="stat">Registros<strong>${rows}</strong></div><div class="stat">Estado<strong>En línea</strong></div></div><div class="panel"><h3>Módulos disponibles</h3>${modules.map(m=>`<p><b>${esc(m.name)}</b> — ${m.rowCount} registros <button class="secondary open" data-id="${m.id}">Abrir</button></p>`).join('')||'<p>Aún no hay módulos.</p>'}</div>`;bindOpen()}
function moduleList(){ $('#content').innerHTML=`<div class="toolbar"><div><h2>Todos los módulos</h2><span class="muted">Datos guardados online.</span></div></div><div class="modules">${modules.map(m=>`<article class="module"><h3>${esc(m.name)}</h3><p>${m.rowCount} registros</p><span class="badge">${m.access==='write'?'Editable':'Solo lectura'}</span><p><button class="primary open" data-id="${m.id}">Abrir</button></p></article>`).join('')}</div>`;bindOpen()}
function bindOpen(){document.querySelectorAll('.open').forEach(b=>b.onclick=()=>openModule(modules.find(m=>m.id===b.dataset.id)))}
async function openModule(m){$('#title').textContent=m.name;$('#content').innerHTML='<p>Cargando…</p>';const r=await db.from('module_rows').select('id,row_number,data').eq('module_id',m.id).order('row_number').limit(500);const cols=m.column_names||[];$('#content').innerHTML=`<div class="toolbar"><button id="back" class="secondary">← Volver</button>${m.access==='write'?'<button id="add" class="primary">Agregar fila</button>':''}</div><div class="tablewrap"><table class="grid"><thead><tr><th>#</th>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${(r.data||[]).map(row=>`<tr><td>${row.row_number}</td>${cols.map(c=>`<td><input data-row="${row.id}" data-col="${esc(c)}" value="${esc(row.data?.[c])}" ${m.access!=='write'?'readonly':''}></td>`).join('')}</tr>`).join('')}</tbody></table></div>`;$('#back').onclick=()=>{activeView='modulos';render()};document.querySelectorAll('.grid input:not([readonly])').forEach(i=>i.onchange=async()=>{const row=(r.data||[]).find(x=>x.id===i.dataset.row),data={...row.data,[i.dataset.col]:i.value};row.data=data;await db.from('module_rows').update({data,updated_by:session.user.id,updated_at:new Date().toISOString()}).eq('id',row.id)});if($('#add'))$('#add').onclick=async()=>{await db.from('module_rows').insert({module_id:m.id,row_number:(r.data.at(-1)?.row_number||0)+1,data:{},updated_by:session.user.id});openModule(m)}}
function importer(){ $('#content').innerHTML='<div class="drop"><h2>Importar ADMIN CLP.xlsx</h2><p>Cada hoja quedará como un módulo online.</p><input id="file" type="file" accept=".xlsx,.xls"><div id="status"></div></div>';$('#file').onchange=e=>importFile(e.target.files[0])}
const slug=v=>v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');const col=n=>{let s='';for(;n>=0;n=Math.floor(n/26)-1)s=String.fromCharCode(n%26+65)+s;return s};
async function importFile(file){if(!file)return;$('#status').innerHTML='<p>Importando…</p>';try{const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});for(const name of wb.SheetNames){const sh=wb.Sheets[name],range=XLSX.utils.decode_range(sh['!ref']||'A1'),cols=Array.from({length:range.e.c+1},(_,i)=>col(i)),old=await db.from('modules').select('id').eq('slug',slug(name)).maybeSingle();let id=old.data?.id;if(!id){const c=await db.from('modules').insert({name,slug:slug(name),column_names:cols,created_by:session.user.id}).select('id').single();if(c.error)throw c.error;id=c.data.id}else{await db.from('module_rows').delete().eq('module_id',id);await db.from('modules').update({column_names:cols}).eq('id',id)}const matrix=XLSX.utils.sheet_to_json(sh,{header:1,raw:false,defval:''});for(let i=0;i<matrix.length;i+=100){const batch=matrix.slice(i,i+100).map((row,j)=>({module_id:id,row_number:i+j+1,data:Object.fromEntries(cols.map((c,k)=>[c,row[k]??''])),updated_by:session.user.id}));const x=await db.from('module_rows').insert(batch);if(x.error)throw x.error}}await loadModules();$('#status').innerHTML='<p class="msg ok">Importación terminada.</p>'}catch(e){$('#status').innerHTML=`<p class="msg">${esc(e.message)}</p>`}}
async function permissions(){const users=await db.from('profiles').select('id,full_name,email,role').order('created_at'),perms=await db.from('module_permissions').select('user_id,module_id,access_level'),map=Object.fromEntries((perms.data||[]).map(x=>[x.user_id+':'+x.module_id,x.access_level]));$('#content').innerHTML=`<div class="tablewrap"><table><thead><tr><th>Usuario</th>${modules.map(m=>`<th>${esc(m.name)}</th>`).join('')}</tr></thead><tbody>${(users.data||[]).map(u=>`<tr><td><b>${esc(u.full_name)}</b><br>${esc(u.email)}</td>${modules.map(m=>`<td>${u.role==='admin'?'Administrador':`<select data-user="${u.id}" data-module="${m.id}"><option value="none">Sin acceso</option><option value="read">Solo lectura</option><option value="write">Editar</option></select>`}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;document.querySelectorAll('select[data-user]').forEach(s=>{s.value=map[s.dataset.user+':'+s.dataset.module]||'none';s.onchange=()=>db.from('module_permissions').upsert({user_id:s.dataset.user,module_id:s.dataset.module,access_level:s.value})})}
init();
</script></body></html>
